<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ recipe.name }}</title>
</head>
<body>
  <p><a href="{% url 'recipes:list' %}">← zpět</a></p>

  <h1>{{ recipe.name }}</h1>

  {% if recipe.time_min %}
    <p>Čas: {{ recipe.time_min }} min</p>
  {% endif %}

  {% if recipe.image %}
    <img src="{{ recipe.image.url }}" alt="{{ recipe.name }}" style="max-width:400px;">
  {% endif %}

  <h3>Suroviny</h3>
  <pre>{{ recipe.ingredients }}</pre>

  <h3>Postup</h3>
  <pre>{{ recipe.steps }}</pre>
</body>
</html>
